name: Build relay image

# Собирает, ПОДПИСЫВАЕТ (cosign keyless) и публикует Docker-образ релея в GHCR.
# H-1 (supply-chain):
#  • least-privilege GITHUB_TOKEN + OIDC (id-token) только для подписи;
#  • все actions запинены по коммит-SHA (не по подвижным тегам);
#  • provenance (SLSA) + SBOM прикладываются к образу;
#  • образ подписывается cosign БЕЗ ключа (identity = этот workflow на main),
#    сервера проверяют подпись перед применением (см. deploy/licno-update.sh);
#  • теги: :sha-<commit> (иммутабельный, для отката/форензики), :canary
#    (для канареечных релеев), :stable (за ним следит флот), :latest (легаси).

on:
  push:
    branches: [main]
    paths:
      - 'relay.js'
      - 'relays.js'
      - 'store.js'
      - 'push.js'
      - 'package.json'
      - 'Dockerfile'
      - '.github/workflows/image.yml'
  workflow_dispatch:

# Минимально необходимые права. id-token — только для keyless-подписи cosign.
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  image:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/relay
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Buildx (docker-container driver — нужен для provenance/SBOM)
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Build & push (with provenance + SBOM)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:stable
            ${{ env.IMAGE }}:canary
            ${{ env.IMAGE }}:sha-${{ github.sha }}

      - name: Sign image (keyless, by digest)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
