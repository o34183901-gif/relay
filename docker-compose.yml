# Релей «Лично» одной командой:  docker compose up -d
#
# Перед запуском скопируйте .env.example -> .env и заполните его. Caddy сам
# получит TLS-сертификат Let's Encrypt для RELAY_HOST, так что приложение сразу
# видит рабочий wss://. Звонки (TURN) включены по умолчанию — coturn поднимается
# вместе с релеем.
#
# Все сервисы имеют restart: unless-stopped и поднимаются автоматически после
# перезагрузки. watchtower авто-обновляет релей при выходе новой версии образа —
# вручную обновлять каждый сервер не нужно (см. README, раздел «Авто-обновление»).

services:
  relay:
    # Флот следит за каналом :stable. Обновление применяет верифицированный
    # апдейтер на хосте (deploy/licno-update.sh): он ПРОВЕРЯЕТ cosign-подпись
    # образа перед тем как поднять его (H-1). Никакого контейнера с docker.sock.
    image: ghcr.io/o34183901-gif/relay:${LICNO_CHANNEL:-stable}
    # Локальная сборка вместо готового образа (тогда авто-обновление не работает):
    # build: .
    restart: unless-stopped
    environment:
      RELAY_SELF_URL: ${RELAY_SELF_URL}
      RELAY_PEERS: ${RELAY_PEERS:-}
      # За Caddy реальный IP клиента приходит в конце X-Forwarded-For (один хоп) —
      # чтобы per-IP лимиты считались по клиенту, а не по адресу Caddy.
      RELAY_TRUST_PROXY: "1"
      # Опционально (безопасность/эксплуатация). Пусто/дефолт — мягкий режим:
      #   RELAY_GOSSIP_TOKEN   — общий токен HTTP-gossip между вашими релеями
      #   RELAY_METRICS_TOKEN  — токен для /metrics (без него endpoint открыт)
      #   RELAY_MAX_QUEUE_BYTES— байтовый потолок очереди (по умолчанию 8 ГБ)
      RELAY_GOSSIP_TOKEN: ${RELAY_GOSSIP_TOKEN:-}
      RELAY_METRICS_TOKEN: ${RELAY_METRICS_TOKEN:-}
      RELAY_MAX_QUEUE_BYTES: ${RELAY_MAX_QUEUE_BYTES:-8589934592}
      # H-2: TURN_SECRET релею больше НЕ передаётся — он сам генерирует секрет и
      # хранит его в data-томе (0600), сам пишет конфиг coturn. RELAY_EMBED_COTURN=1
      # включает встроенный coturn (turnserver дочерним процессом ЭТОГО контейнера)
      # — отдельный сервис coturn не нужен, весь TURN едет в образе (автономно).
      TURN_HOST: ${TURN_HOST}
      RELAY_EMBED_COTURN: "1"
    volumes:
      - relay-data:/data
    expose:
      - "8787"
    # Порты TURN для звонков: сигналинг/STUN (3478) и диапазон медиа-ретрансляции.
    # Публичный IP клиентам сообщается через external-ip=TURN_HOST в конфиге coturn.
    # Открыть в firewall: 3478/tcp, 3478/udp, 49160-49200/udp.
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49160-49200:49160-49200/udp"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [relay]
    ports:
      - "80:80"
      - "443:443"
    environment:
      RELAY_HOST: ${RELAY_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  # TURN-сервер для звонков теперь ВСТРОЕН в контейнер relay (RELAY_EMBED_COTURN):
  # релей сам запускает turnserver дочерним процессом и владеет секретом/конфигом.
  # Отдельного сервиса coturn больше нет — его удаление применяется командой
  # `docker compose up -d --remove-orphans`.

  # Авто-обновление БОЛЬШЕ НЕ через watchtower (H-1): его заменил верифицированный
  # апдейтер на хосте — systemd-таймер, который проверяет cosign-подпись образа
  # :stable ПЕРЕД применением и не монтирует docker.sock в контейнер. Установка
  # разово: `sudo bash deploy/install-updater.sh` (см. deploy/ и README).
  # Старый сервис watchtower удаляется командой `docker compose up -d --remove-orphans`.

volumes:
  relay-data:
  caddy-data:
  caddy-config:
