# Автономный стек релея «Лично»: релей + Caddy (авто-TLS) + coturn (звонки).
#   docker compose up -d --build
# Конфиг и секреты — в .env (см. .env.example / relay-install.sh).

services:
  relay:
    build: .
    image: licno-relay:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      PORT: "8787"
      RELAY_DB: /data/relay.db
      RELAY_BLOB_DIR: /data/blobs
      RELAY_SIGN_KEY_FILE: /data/relay-sign.key
      # За Caddy: реальный IP клиента — в конце X-Forwarded-For (один хоп).
      RELAY_TRUST_PROXY: "1"
      RELAY_SELF_URL: ${RELAY_SELF_URL}
      RELAY_PEERS: ${RELAY_PEERS:-}
      RELAY_GOSSIP_TOKEN: ${RELAY_GOSSIP_TOKEN:-}
      RELAY_METRICS_TOKEN: ${RELAY_METRICS_TOKEN:-}
      RELAY_MAX_QUEUE_BYTES: ${RELAY_MAX_QUEUE_BYTES:-8589934592}
      TURN_HOST: ${TURN_HOST:-}
      TURN_SECRET: ${TURN_SECRET:-}
      # FCM (необязательно): положите service-account.json в том /data
      # (relay-install.sh сделает это сам, если файл лежит рядом).
      GOOGLE_APPLICATION_CREDENTIALS: /data/service-account.json
    volumes:
      - relay-data:/data
    expose:
      - "8787"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - relay
    ports:
      - "80:80"
      - "443:443"
    environment:
      RELAY_HOST: ${RELAY_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  # TURN нужен реальный публичный IP и диапазон портов — host-сеть.
  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    command:
      - -n
      - --use-auth-secret
      - --static-auth-secret=${TURN_SECRET}
      - --realm=licno
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --no-cli
      - --no-tls
      - --no-dtls
      - --external-ip=${TURN_HOST}

volumes:
  relay-data:
  caddy-data:
  caddy-config:
